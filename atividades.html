<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Atividades de Física</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

<div class="container">

    <h1>🧪 Atividades de Física</h1>

    <section class="atividade">
        <h2>Atividade 1</h2>
        <p>Converter metros em centímetros.</p>
        <button onclick="atividade1()">Converter</button>
    </section>

    <section class="atividade">
        <h2>Atividade 2</h2>
        <p>Calcular a área de um quadrado.</p>
        <button onclick="atividade2()">Calcular área</button>
    </section>

    <section class="atividade">
        <h2>Atividade 3</h2>
        <p>Calcular a força (F = m · a).</p>
        <button onclick="atividade3()">Calcular força</button>
    </section>

    <section class="atividade">
        <h2>Atividade 4</h2>
        <p>Converter Celsius para Fahrenheit.</p>
        <button onclick="atividade4()">Converter temperatura</button>
    </section>

    <a href="index.html" class="btn">⬅ Voltar</a>
